name: MaaS Controller

on:
  push:
    branches:
      - main
    paths:
      - 'maas-controller/**'
      - '.github/workflows/maas-controller-ci.yml'
  pull_request:
    paths:
      - 'maas-controller/**'
      - '.github/workflows/maas-controller-ci.yml'

permissions:
  actions: read
  contents: read

env:
  PROJECT_DIR: maas-controller

defaults:
  
  run:
    working-directory: maas-controller

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - name: Align golangci-lint version with Makefile
        id: golangci-version
        run: |
          VERSION=$(grep '^GOLANGCI_LINT_VERSION' tools.mk | cut -d'=' -f2 | tr -d ' ?')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: maas-controller/go.mod
          cache: true
          cache-dependency-path: maas-controller/go.sum
      
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: ${{ steps.golangci-version.outputs.version }}
          working-directory: ${{ env.PROJECT_DIR }}
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: ${{ env.PROJECT_DIR }}/go.mod
          cache: true
          cache-dependency-path: ${{ env.PROJECT_DIR }}/go.sum

      - name: Run tests
        run: make test

      - name: Upload coverage reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-reports
          path: |
            ${{ env.PROJECT_DIR }}/coverage.out
            ${{ env.PROJECT_DIR }}/coverage.html
          retention-days: 30

      - name: Build image
        run: make image-build
      
      - name: Login to Quay.io
        if: github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: quay.io
          username: ${{ secrets.APP_QUAY_USERNAME }}
          password: ${{ secrets.APP_QUAY_TOKEN }}
      
      - name: Push image to Quay.io
        if: github.event_name == 'push'
        run: | 
          make image-push
          make image-push -e IMAGE_TAG=${{ github.sha }}
