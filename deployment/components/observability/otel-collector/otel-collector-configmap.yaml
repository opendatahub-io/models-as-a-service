apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: openshift-ingress
  labels:
    app.kubernetes.io/part-of: maas-observability
data:
  collector.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      bearertokenauth:
        filename: /var/run/secrets/kubernetes.io/serviceaccount/token

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317

    processors:
      resource:
        attributes:
        - key: service.name
          value: maas-gateway
          action: upsert
        - key: service.namespace
          value: openshift-ingress
          action: upsert
        - key: kubernetes_namespace_name
          value: openshift-ingress
          action: upsert
        - key: service.instance.id
          value: "${env:POD_NAME}"
          action: upsert
      transform:
        log_statements:
        - context: log
          statements:
          - replace_pattern(attributes["user_id"], "^\"(.*)\"$", "$$1")
          - replace_pattern(attributes["subscription"], "^\"(.*)\"$", "$$1")
      groupbyattrs:
        keys:
        - subscription
        - model
        - response_code
        - method
      batch:
        timeout: 5s
        send_batch_size: 1000

    exporters:
      otlphttp/loki:
        endpoint: "LOKI_OTLP_ENDPOINT_PLACEHOLDER"
        auth:
          authenticator: bearertokenauth
        tls:
          ca_file: /etc/loki-ca/service-ca.crt
          insecure_skip_verify: LOKI_TLS_INSECURE_SKIP_VERIFY_PLACEHOLDER

    service:
      extensions: [health_check, bearertokenauth]
      pipelines:
        logs:
          receivers: [otlp]
          processors: [resource, transform, groupbyattrs, batch]
          exporters: [otlphttp/loki]
