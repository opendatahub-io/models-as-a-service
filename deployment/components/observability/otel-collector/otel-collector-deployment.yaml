apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: openshift-ingress
  labels:
    app: otel-collector
    app.kubernetes.io/part-of: maas-observability
spec:
  replicas: 2
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
        app.kubernetes.io/part-of: maas-observability
    spec:
      serviceAccountName: otel-collector
      containers:
      - name: otel-collector
        image: registry.redhat.io/rhosdt/opentelemetry-collector-rhel9@sha256:f970e31da49e636dcf93d989cae7b4a0c752d0dea05a3f9fcdcf5b2c6ac5f04e
        args:
        - --config=/etc/otelcol/collector.yaml
        ports:
        - name: otlp-grpc
          containerPort: 4317
          protocol: TCP
        - name: health
          containerPort: 13133
          protocol: TCP
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        volumeMounts:
        - name: otel-collector-config
          mountPath: /etc/otelcol
          readOnly: true
        - name: loki-ca
          mountPath: /etc/loki-ca
          readOnly: true
        livenessProbe:
          httpGet:
            path: /
            port: health
        readinessProbe:
          httpGet:
            path: /
            port: health
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: otel-collector-config
        configMap:
          name: otel-collector-config
      - name: loki-ca
        configMap:
          name: loki-gateway-ca
          items:
          - key: service-ca.crt
            path: service-ca.crt
