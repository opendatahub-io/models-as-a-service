apiVersion: v1
kind: ServiceAccount
metadata:
  name: usage-logs-collector
  namespace: opendatahub
  labels:
    app.kubernetes.io/part-of: maas-observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: maas-otel-loki-writer
  labels:
    app.kubernetes.io/part-of: maas-observability
rules:
- apiGroups:
  - loki.grafana.com
  resources:
  - application
  resourceNames:
  - logs
  verbs:
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: maas-otel-loki-writer
  labels:
    app.kubernetes.io/part-of: maas-observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: maas-otel-loki-writer
subjects:
- kind: ServiceAccount
  name: usage-logs-collector
  namespace: opendatahub
