# Perses Datasource for Loki (admin — direct to LokiStack Gateway)
#
# Admin dashboards access Loki directly via the gateway with SA token + mTLS.
# No proxy needed — admins see all application logs without filtering.
#
# Deployed to openshift-operators for Platform Admin / AI Engineer dashboards.
---
apiVersion: perses.dev/v1alpha2
kind: PersesDatasource
metadata:
  name: loki
  labels:
    app: perses
    app.kubernetes.io/part-of: maas-observability
spec:
  config:
    display:
      name: "Loki (MaaS Structured Logs)"
    default: false
    plugin:
      kind: "LokiDatasource"
      spec:
        proxy:
          kind: HTTPProxy
          spec:
            url: https://maas-loki-gateway-http.openshift-logging.svc:8080/api/logs/v1/application
            secret: "loki-secret"
            allowedEndpoints:
              - endpointPattern: /loki/api/v1/.*
                method: GET
  client:
    tls:
      enable: true
      insecureSkipVerify: false
      caCert:
        type: configmap
        name: loki-gateway-serving-ca
        certPath: service-ca.crt
