# Admin LokiDatasource — direct to LokiStack, no user filtering.
# NAMING: The scoped datasource is "scoped-loki" (NOT "loki-scoped") because
# the monitoring-console-plugin uses prefix matching on datasource names.
---
apiVersion: perses.dev/v1alpha1
kind: PersesDatasource
metadata:
  name: loki
  labels:
    app: perses
    app.kubernetes.io/part-of: maas-observability
spec:
  config:
    display:
      name: "Loki (Admin)"
    default: true
    plugin:
      kind: "LokiDatasource"
      spec:
        proxy:
          kind: HTTPProxy
          spec:
            url: https://lokistack-sample-gateway-http.logging4.svc.cluster.local:8080/api/logs/v1/application
            allowedEndpoints:
              - endpointPattern: "/loki/api/v1/.*"
                method: GET
            secret: "loki-secret"
  client:
    kubernetesAuth:
      enable: true
    tls:
      enable: true
      insecureSkipVerify: false
      caCert:
        type: configmap
        name: loki-gateway-serving-ca
        certPath: service-ca.crt
