# User-scoped LokiDatasource — routes through loki-query-proxy which injects
# user_id filtering based on the caller's Kubernetes token.
# kubernetesAuth forwards the Console user's OAuth token to the proxy.
# NAMING: "scoped-loki" (NOT "loki-scoped") to avoid prefix collision with "loki".
# See perses-loki-datasource.yaml.
---
apiVersion: perses.dev/v1alpha1
kind: PersesDatasource
metadata:
  name: scoped-loki
  labels:
    app: perses
    app.kubernetes.io/part-of: maas-observability
spec:
  config:
    display:
      name: "Loki (User Scoped)"
    default: false
    plugin:
      kind: "LokiDatasource"
      spec:
        proxy:
          kind: HTTPProxy
          spec:
            url: http://loki-query-proxy-user.opendatahub.svc:8080
            allowedEndpoints:
              - endpointPattern: "/loki/api/v1/.*"
                method: GET
  client:
    kubernetesAuth:
      enable: true
