# RBAC for Perses to query Loki via LokiStack Gateway
#
# The LokiStack gateway enforces access via OPA rules that check if
# the bearer token's ServiceAccount has the cluster-logging-application-view
# ClusterRole bound. This ClusterRoleBinding grants cluster-wide read access
# to application-tenant logs in Loki.
#
# For namespace-scoped access, use a RoleBinding in specific namespaces instead.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: perses-loki-application-view
  labels:
    app: perses
    app.kubernetes.io/part-of: maas-observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-logging-application-view
subjects:
  - kind: ServiceAccount
    name: perses-sa
    namespace: openshift-operators
