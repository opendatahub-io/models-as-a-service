# Perses Kustomization for MaaS Observability
#
# Targets openshift-operators (where the UIPlugin creates Perses).
# For full deployment use: ./scripts/observability/install-perses-dashboards.sh
# which also handles the tenant-scoped Usage Dashboard in kuadrant-system.
#
# Direct kustomize usage:
#   kustomize build deployment/components/observability/perses | kubectl apply -f -
#
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: maas-perses
  annotations:
    config.kubernetes.io/local-config: "true"

namespace: openshift-operators

resources:
  # Prometheus datasource (Thanos Querier)
  - perses-thanos-ca.yaml
  - perses-datasource.yaml
  # Loki datasource (structured logs via LokiStack Gateway)
  - perses-loki-ca.yaml
  - perses-loki-datasource.yaml
  - perses-loki-rbac.yaml
  # Admin dashboards (openshift-operators)
  - dashboards/dashboard-ai-engineer.yaml
  - dashboards/dashboard-platform-admin.yaml
  # dashboard-usage.yaml is tenant-scoped (kuadrant-system) — deployed by install-perses-dashboards.sh
  # Tenant-scoped resources (datasource-scoped, rbac-scoped) and UIPlugin also applied by that script

labels:
  - pairs:
      app.kubernetes.io/managed-by: maas-observability
      app.kubernetes.io/component: perses
    includeSelectors: false

