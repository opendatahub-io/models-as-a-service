# Perses Datasource for OpenShift Prometheus (Thanos Querier)
# Based on official OpenShift sample from perses-operator
#
# DEPLOYMENT:
# - UIPlugin mode: Apply to openshift-operators namespace
#   kubectl apply -f perses-datasource.yaml -n openshift-operators
# - Standalone mode: Applied via kustomize to maas-api namespace
#
# NOTE: Unlike Grafana, Perses datasource does NOT require explicit bearer
# token auth. The Cluster Observability Operator handles authentication
# through the pod's ServiceAccount and RBAC configuration.
#
# TLS: Thanos Querier serves HTTPS signed by the OpenShift service CA.
# The operator creates a Perses Secret named "prometheus-secret" from the
# client.tls config below; the proxy references it via the "secret" field.
# The caCert references a ConfigMap populated by OpenShift's service CA
# operator (see perses-thanos-ca.yaml).
---
apiVersion: perses.dev/v1alpha1
kind: PersesDatasource
metadata:
  name: prometheus
  labels:
    app: perses
    app.kubernetes.io/part-of: maas-observability
spec:
  config:
    display:
      name: "Prometheus (Thanos Querier)"
    default: true
    plugin:
      kind: "PrometheusDatasource"
      spec:
        proxy:
          kind: HTTPProxy
          spec:
            url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
            secret: "prometheus-secret"
  # The operator translates this into a Perses Secret named "prometheus-secret"
  # (datasource name + "-secret") that the proxy references above.
  client:
    tls:
      enable: true
      insecureSkipVerify: false
      caCert:
        type: configmap
        name: thanos-querier-serving-ca
        certPath: service-ca.crt
