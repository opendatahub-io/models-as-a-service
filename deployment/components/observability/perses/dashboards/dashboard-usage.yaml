# Perses Dashboard: Usage Dashboard
# All per-user panels query Loki structured logs via LogQL.
#
# $__range is a Perses built-in variable (since v0.40.0) that binds to the native
# time picker, so all LogQL windows track the dashboard time range automatically.
#
# user_id, tokens_total, etc. are Loki structured metadata — accessible via
# pipeline filters (| user_id=~"..." | unwrap tokens_total) without | json.
# Stream labels (from groupbyattrs): subscription, model, response_code, method.
#
# Subscription and Model dropdowns use StaticListVariable because Perses has no
# LokiLabelValuesVariable plugin yet. To add new values, update the YAML;
# default $__all still includes all models/subscriptions in aggregates.
#
# Token consumption: Perses ``stack: all`` + ``areaOpacity: 1`` when the console honors it.
# **Filled-line mock (Grafana):** ``docs/samples/dashboards/grafana-usage-loki-token-mock.json``.
# **View by** (``view_by``): ``model`` | ``subscription`` drives the chart via ``sum by (${view_by:raw})``.
# Table uses hardcoded ``sum by (model, subscription)`` — both columns always filled.
# Perses ``columnSettings`` renders headers for labels absent from data (Limitation E in plan doc),
# so driving the table with ``${view_by:raw}`` leaves an empty Model or Subscription column.
#
# user_id!="-" filters out health-check / probe traffic (user_id="-").
apiVersion: perses.dev/v1alpha1
kind: PersesDashboard
metadata:
  name: usage-dashboard
  labels:
    app: perses
    app.kubernetes.io/part-of: maas-observability
  annotations:
    maas.observability/visual-revision: "2026-05-17-table-both-cols-filled"
spec:
  display:
    name: "Usage Dashboard"
    description: >-
      Token consumption overview (RHOAI mock): chart + usage breakdown table. Filled chart reference:
      docs/samples/dashboards/grafana-usage-loki-token-mock.json.
  duration: 1h

  variables:
    - kind: TextVariable
      spec:
        name: user
        display:
          name: "User ID"
        value: ".+"
    - kind: ListVariable
      spec:
        name: subscription
        display:
          name: "Subscription"
        allowMultiple: true
        allowAllValue: true
        defaultValue: "$__all"
        plugin:
          kind: StaticListVariable
          spec:
            values:
              - "simulator-subscription"
              - "standard-subscription"
              - "sh-older-subscription"
    - kind: ListVariable
      spec:
        name: model
        display:
          name: "Model"
        allowMultiple: true
        allowAllValue: true
        defaultValue: "$__all"
        plugin:
          kind: StaticListVariable
          spec:
            values:
              - "facebook/opt-125m"
              # Friendly label in the UI; LogQL still uses value the-best-gpt-3.5-m
              - value: "the-best-gpt-3.5-m"
                label: "My model"
              - "meta-llama/Llama-3.2-1B-Instruct"
    - kind: ListVariable
      spec:
        name: view_by
        display:
          name: "View by"
        allowMultiple: false
        allowAllValue: false
        defaultValue: "model"
        plugin:
          kind: StaticListVariable
          spec:
            values:
              - value: "model"
                label: By model
              - value: "subscription"
                label: By subscription

  panels:
    totalTokens:
      kind: Panel
      spec:
        display:
          name: "Total Tokens"
          description: "Total tokens consumed over the selected time window."
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
              shortValues: true
              decimalPlaces: 0
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    sum(sum_over_time({service_name="maas-gateway", response_code=~"2..",
                    subscription=~"$subscription", model=~"$model"}
                    | user_id=~"$user" | user_id!="-" | unwrap tokens_total [$__range]))
                    or vector(0)

    totalRequests:
      kind: Panel
      spec:
        display:
          name: "Total Requests"
          description: "Total API requests (authorized + rate-limited) over the selected time window."
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
              shortValues: true
              decimalPlaces: 0
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    sum(count_over_time({service_name="maas-gateway",
                    subscription=~"$subscription"}
                    | user_id=~"$user" | user_id!="-" [$__range]))
                    or vector(0)

    totalErrors:
      kind: Panel
      spec:
        display:
          name: "Total Errors"
          description: "Total rate-limited requests over the selected time window."
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
              shortValues: true
              decimalPlaces: 0
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    sum(count_over_time({service_name="maas-gateway", response_code="429",
                    subscription=~"$subscription"}
                    | user_id=~"$user" | user_id!="-" [$__range]))
                    or vector(0)

    successRate:
      kind: Panel
      spec:
        display:
          description: "Percentage of authorized vs total requests over the selected time window."
          name: Success Rate
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              decimalPlaces: 1
              unit: percent-decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    (sum(count_over_time({service_name="maas-gateway", response_code=~"2..",
                    subscription=~"$subscription"}
                    | user_id=~"$user" | user_id!="-" [$__range]))
                    /
                    sum(count_over_time({service_name="maas-gateway",
                    subscription=~"$subscription"}
                    | user_id=~"$user" | user_id!="-" [$__range])))
                    or vector(1)

    activeUsers:
      kind: Panel
      spec:
        display:
          name: "Active Users"
          description: "Distinct users with API activity over the selected time window."
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    count(sum by (user_id) (count_over_time({service_name="maas-gateway",
                    subscription=~"$subscription"}
                    | user_id=~"$user" | user_id!="" | user_id!="-" [$__range])))
                    or vector(0)

    tokenConsumptionOverTime:
      kind: Panel
      spec:
        display:
          name: "Token consumption"
          description: >-
            Grafana filled mock: docs/samples/dashboards/grafana-usage-loki-token-mock.json (import + Loki).
            Tokens from successful requests (2xx) over time by model or subscription
            **View by** drives chart ``sum by (${view_by:raw})``. Table uses hardcoded ``sum by (model, subscription)``.
            LogQL ``[30m]`` is the range window for ``sum_over_time`` (Perses time-series step).
            Visual: OpenShift Perses pattern — ``line`` + ``areaOpacity: 1`` + ``stack: all``.
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
              values: []
            visual:
              display: line
              lineWidth: 3
              areaOpacity: 1
              connectNulls: true
              stack: all
              showPoints: always
              pointRadius: 6
            yAxis:
              min: 0
              format:
                unit: decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    sum by (${view_by:raw}) (sum_over_time({service_name="maas-gateway", response_code=~"2..",
                    subscription=~"$subscription", model=~"$model"}
                    | user_id=~"$user" | user_id!="-" | unwrap tokens_total [30m]))

    tokenConsumptionTable:
      kind: Panel
      spec:
        display:
          name: "Usage breakdown"
          description: >-
            All model/subscription pairs. **View by** changes the chart; table always shows full detail.
        plugin:
          kind: Table
          spec:
            density: "compact"
            pagination: true
            transforms:
              - kind: "MergeSeries"
                spec: {}
            columnSettings:
              - name: "timestamp"
                hide: true
              - name: "model"
                header: "Model"
                align: "left"
                enableSorting: true
              - name: "subscription"
                header: "Subscription"
                align: "left"
                enableSorting: true
              - name: "value #1"
                header: "Tokens used"
                align: "right"
                enableSorting: true
                sort: "desc"
                format:
                  unit: decimal
                  shortValues: true
              - name: "value #2"
                header: "Requests"
                align: "right"
                enableSorting: true
                format:
                  unit: decimal
                  decimalPlaces: 0
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    sum by (model, subscription) (sum_over_time(
                    {service_name="maas-gateway", response_code=~"2..",
                    subscription=~"$subscription", model=~"$model"}
                    | user_id=~"$user" | user_id!="-" | unwrap tokens_total [$__range]))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    sum by (model, subscription) (count_over_time(
                    {service_name="maas-gateway", response_code=~"2..",
                    subscription=~"$subscription", model=~"$model"}
                    | user_id=~"$user" | user_id!="-" [$__range]))

  layouts:
    - kind: Grid
      spec:
        display:
          title: "Overview"
          collapse:
            open: true
        items:
          - x: 0
            "y": 0
            width: 5
            height: 5
            content:
              "$ref": "#/spec/panels/totalTokens"
          - x: 5
            "y": 0
            width: 5
            height: 5
            content:
              "$ref": "#/spec/panels/totalRequests"
          - x: 10
            "y": 0
            width: 5
            height: 5
            content:
              "$ref": "#/spec/panels/totalErrors"
          - x: 15
            "y": 0
            width: 5
            height: 5
            content:
              "$ref": "#/spec/panels/successRate"
          - x: 20
            "y": 0
            width: 4
            height: 5
            content:
              "$ref": "#/spec/panels/activeUsers"

    - kind: Grid
      spec:
        display:
          title: "Token consumption"
          collapse:
            open: true
        items:
          - x: 0
            "y": 0
            width: 24
            height: 10
            content:
              "$ref": "#/spec/panels/tokenConsumptionOverTime"
          - x: 0
            "y": 10
            width: 24
            height: 8
            content:
              "$ref": "#/spec/panels/tokenConsumptionTable"
