# Perses Dashboard: Usage Dashboard
# Hybrid Prometheus + Loki: all per-user panels query Loki structured logs via LogQL.
#
# Ideally, in Grafana/Prometheus, the dashboard time range drives every LogQL window (e.g. $__range).
# Perses does not bind the native time picker to Loki that way. Workaround: a separate Time Range
# variable built with StaticListVariable; users pick 24h etc. there; queries use [$range] from that
# list. Set the native picker >= $range so results are not clipped.
#
# Perses cannot do dynamic time binding to Loki queries or dynamic Loki label pickers, so we use
# StaticListVariable — hardcoded dropdown options — instead. The same applies to the Subscription
# and Model dropdowns: label auto-discovery is not available in Perses. To add new names, update
# values: in YAML; default $__all still includes all models/subscriptions in aggregates.
#
# user_id, tokens_total, etc. are Loki structured metadata — accessible via
# pipeline filters (| user_id=~"..." | unwrap tokens_total) without | json.
# Stream labels (from groupbyattrs): subscription, model, response_code, method.
#
# The Perses Loki plugin lacks $__range tied to the picker and reliable instant query
# behavior for tables/stats; $range remains the single source of truth for query windows.
# user_id!="-" filters out health-check / probe traffic (user_id="-").
apiVersion: perses.dev/v1alpha1
kind: PersesDashboard
metadata:
  name: usage-dashboard
  labels:
    app: perses
    app.kubernetes.io/part-of: maas-observability
spec:
  display:
    name: "Usage Dashboard"
    description: "Token consumption overview and per-user usage breakdown"
  duration: 1h

  variables:
    - kind: ListVariable
      spec:
        name: range
        display:
          name: "Time Range"
        allowMultiple: false
        allowAllValue: false
        defaultValue: "24h"
        plugin:
          kind: StaticListVariable
          spec:
            values:
              - "1h"
              - "3h"
              - "6h"
              - "12h"
              - "24h"
              - "3d"
              - "7d"
              - "14d"
              - "21d"
              - "30d"
    - kind: TextVariable
      spec:
        name: user
        display:
          name: "User ID"
        value: ".+"
    - kind: ListVariable
      spec:
        name: subscription
        display:
          name: "Subscription"
        allowMultiple: true
        allowAllValue: true
        defaultValue: "$__all"
        plugin:
          kind: StaticListVariable
          spec:
            values:
              - "simulator-subscription"
    - kind: ListVariable
      spec:
        name: model
        display:
          name: "Model"
        allowMultiple: true
        allowAllValue: true
        defaultValue: "$__all"
        plugin:
          kind: StaticListVariable
          spec:
            values:
              - "facebook/opt-125m"

  panels:
    totalTokens:
      kind: Panel
      spec:
        display:
          name: "Total Tokens"
          description: "Total tokens consumed over the selected Time Range."
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
              shortValues: true
              decimalPlaces: 0
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    sum(sum_over_time({service_name="maas-gateway", response_code=~"2..",
                    subscription=~"$subscription", model=~"$model"}
                    | user_id=~"$user" | user_id!="-" | unwrap tokens_total [$range]))
                    or vector(0)

    totalRequests:
      kind: Panel
      spec:
        display:
          name: "Total Requests"
          description: "Total API requests (authorized + rate-limited) over the selected Time Range."
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
              shortValues: true
              decimalPlaces: 0
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    sum(count_over_time({service_name="maas-gateway",
                    subscription=~"$subscription"}
                    | user_id=~"$user" | user_id!="-" [$range]))
                    or vector(0)

    totalErrors:
      kind: Panel
      spec:
        display:
          name: "Total Errors"
          description: "Total rate-limited requests over the selected Time Range."
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
              shortValues: true
              decimalPlaces: 0
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    sum(count_over_time({service_name="maas-gateway", response_code="429",
                    subscription=~"$subscription"}
                    | user_id=~"$user" | user_id!="-" [$range]))
                    or vector(0)

    successRate:
      kind: Panel
      spec:
        display:
          description: "Percentage of authorized vs total requests over the selected Time Range."
          name: Success Rate
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              decimalPlaces: 1
              unit: percent-decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    (sum(count_over_time({service_name="maas-gateway", response_code=~"2..",
                    subscription=~"$subscription"}
                    | user_id=~"$user" | user_id!="-" [$range]))
                    /
                    sum(count_over_time({service_name="maas-gateway",
                    subscription=~"$subscription"}
                    | user_id=~"$user" | user_id!="-" [$range])))
                    or vector(1)

    activeUsers:
      kind: Panel
      spec:
        display:
          name: "Active Users"
          description: "Distinct users with API activity over the selected Time Range."
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    count(sum by (user_id) (count_over_time({service_name="maas-gateway",
                    subscription=~"$subscription"}
                    | user_id=~"$user" | user_id!="" | user_id!="-" [$range])))
                    or vector(0)

    tokenConsumptionByUser:
      kind: Panel
      spec:
        display:
          name: "Token Consumption by User"
          description: "Per-user totals over the Time Range dropdown window."
        plugin:
          kind: Table
          spec:
            density: "compact"
            pagination: true
            transforms:
              - kind: "MergeSeries"
                spec: {}
            columnSettings:
              - name: "timestamp"
                hide: true
              - name: "user_id"
                header: "User"
                align: "left"
                enableSorting: true
              - name: "subscription"
                header: "Subscription"
                align: "left"
                enableSorting: true
              - name: "value #1"
                header: "Tokens"
                align: "right"
                enableSorting: true
                sort: "desc"
                format:
                  unit: decimal
                  shortValues: true
              - name: "value #2"
                header: "Requests"
                align: "right"
                enableSorting: true
                format:
                  unit: decimal
                  decimalPlaces: 0
              - name: "value #3"
                header: "Rate Limited"
                align: "right"
                enableSorting: true
                format:
                  unit: decimal
                  decimalPlaces: 0
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    sum by (user_id, subscription) (sum_over_time(
                    {service_name="maas-gateway", response_code=~"2..",
                    subscription=~"$subscription", model=~"$model"}
                    | user_id=~"$user" | user_id!="" | user_id!="-"
                    | unwrap tokens_total [$range]))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    sum by (user_id, subscription) (count_over_time(
                    {service_name="maas-gateway", response_code=~"2..",
                    subscription=~"$subscription", model=~"$model"}
                    | user_id=~"$user" | user_id!="" | user_id!="-" [$range]))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    sum by (user_id, subscription) (count_over_time(
                    {service_name="maas-gateway", response_code="429",
                    subscription=~"$subscription"}
                    | user_id=~"$user" | user_id!="" | user_id!="-" [$range]))
                    or
                    sum by (user_id, subscription) (sum_over_time(
                    {service_name="maas-gateway", response_code=~"2..",
                    subscription=~"$subscription", model=~"$model"}
                    | user_id=~"$user" | user_id!="" | user_id!="-"
                    | unwrap tokens_total [$range])) * 0

  layouts:
    - kind: Grid
      spec:
        display:
          title: "Overview"
          collapse:
            open: true
        items:
          - x: 0
            "y": 0
            width: 5
            height: 5
            content:
              "$ref": "#/spec/panels/totalTokens"
          - x: 5
            "y": 0
            width: 5
            height: 5
            content:
              "$ref": "#/spec/panels/totalRequests"
          - x: 10
            "y": 0
            width: 5
            height: 5
            content:
              "$ref": "#/spec/panels/totalErrors"
          - x: 15
            "y": 0
            width: 5
            height: 5
            content:
              "$ref": "#/spec/panels/successRate"
          - x: 20
            "y": 0
            width: 4
            height: 5
            content:
              "$ref": "#/spec/panels/activeUsers"

    - kind: Grid
      spec:
        display:
          title: "Token Consumption by User"
          collapse:
            open: true
        items:
          - x: 0
            "y": 0
            width: 24
            height: 12
            content:
              "$ref": "#/spec/panels/tokenConsumptionByUser"
