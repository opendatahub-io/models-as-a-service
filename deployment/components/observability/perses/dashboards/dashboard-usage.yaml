# Perses Dashboard: Usage Dashboard
# All per-user panels query Loki structured logs via LogQL.
#
# $__range is a Perses built-in variable (since v0.40.0) that binds to the native
# time picker, so all LogQL windows track the dashboard time range automatically.
#
# user_id, tokens_total, etc. are Loki structured metadata — accessible via
# pipeline filters (| user_id=~"..." | unwrap tokens_total) without | json.
# Stream labels (from groupbyattrs): subscription, model, response_code, method.
#
# Subscription and Model dropdowns use StaticListVariable because Perses has no
# LokiLabelValuesVariable plugin yet. To add new values, update the YAML;
# default $__all still includes all models/subscriptions in aggregates.
#
# user_id!="-" filters out health-check / probe traffic (user_id="-").
apiVersion: perses.dev/v1alpha1
kind: PersesDashboard
metadata:
  name: usage-dashboard
  labels:
    app: perses
    app.kubernetes.io/part-of: maas-observability
spec:
  display:
    name: "Usage Dashboard"
    description: "Token consumption overview and per-user usage breakdown"
  duration: 1h

  variables:
    - kind: TextVariable
      spec:
        name: user
        display:
          name: "User ID"
        value: ".+"
    - kind: ListVariable
      spec:
        name: subscription
        display:
          name: "Subscription"
        allowMultiple: true
        allowAllValue: true
        defaultValue: "$__all"
        plugin:
          kind: StaticListVariable
          spec:
            values:
              - "simulator-subscription"
    - kind: ListVariable
      spec:
        name: model
        display:
          name: "Model"
        allowMultiple: true
        allowAllValue: true
        defaultValue: "$__all"
        plugin:
          kind: StaticListVariable
          spec:
            values:
              - "facebook/opt-125m"

  panels:
    totalTokens:
      kind: Panel
      spec:
        display:
          name: "Total Tokens"
          description: "Total tokens consumed over the selected time window."
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
              shortValues: true
              decimalPlaces: 0
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    sum(sum_over_time({service_name="maas-gateway", response_code=~"2..",
                    subscription=~"$subscription", model=~"$model"}
                    | user_id=~"$user" | user_id!="-" | unwrap tokens_total [$__range]))
                    or vector(0)

    totalRequests:
      kind: Panel
      spec:
        display:
          name: "Total Requests"
          description: "Total API requests (authorized + rate-limited) over the selected time window."
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
              shortValues: true
              decimalPlaces: 0
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    sum(count_over_time({service_name="maas-gateway",
                    subscription=~"$subscription"}
                    | user_id=~"$user" | user_id!="-" [$__range]))
                    or vector(0)

    totalErrors:
      kind: Panel
      spec:
        display:
          name: "Total Errors"
          description: "Total rate-limited requests over the selected time window."
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
              shortValues: true
              decimalPlaces: 0
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    sum(count_over_time({service_name="maas-gateway", response_code="429",
                    subscription=~"$subscription"}
                    | user_id=~"$user" | user_id!="-" [$__range]))
                    or vector(0)

    successRate:
      kind: Panel
      spec:
        display:
          description: "Percentage of authorized vs total requests over the selected time window."
          name: Success Rate
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              decimalPlaces: 1
              unit: percent-decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    (sum(count_over_time({service_name="maas-gateway", response_code=~"2..",
                    subscription=~"$subscription"}
                    | user_id=~"$user" | user_id!="-" [$__range]))
                    /
                    sum(count_over_time({service_name="maas-gateway",
                    subscription=~"$subscription"}
                    | user_id=~"$user" | user_id!="-" [$__range])))
                    or vector(1)

    activeUsers:
      kind: Panel
      spec:
        display:
          name: "Active Users"
          description: "Distinct users with API activity over the selected time window."
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    count(sum by (user_id) (count_over_time({service_name="maas-gateway",
                    subscription=~"$subscription"}
                    | user_id=~"$user" | user_id!="" | user_id!="-" [$__range])))
                    or vector(0)

    tokenConsumptionByUser:
      kind: Panel
      spec:
        display:
          name: "Token Consumption by User"
          description: "Per-user totals over the selected time window."
        plugin:
          kind: Table
          spec:
            density: "compact"
            pagination: true
            transforms:
              - kind: "MergeSeries"
                spec: {}
            columnSettings:
              - name: "timestamp"
                hide: true
              - name: "user_id"
                header: "User"
                align: "left"
                enableSorting: true
              - name: "subscription"
                header: "Subscription"
                align: "left"
                enableSorting: true
              - name: "value #1"
                header: "Tokens"
                align: "right"
                enableSorting: true
                sort: "desc"
                format:
                  unit: decimal
                  shortValues: true
              - name: "value #2"
                header: "Requests"
                align: "right"
                enableSorting: true
                format:
                  unit: decimal
                  decimalPlaces: 0
              - name: "value #3"
                header: "Rate Limited"
                align: "right"
                enableSorting: true
                format:
                  unit: decimal
                  decimalPlaces: 0
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    sum by (user_id, subscription) (sum_over_time(
                    {service_name="maas-gateway", response_code=~"2..",
                    subscription=~"$subscription", model=~"$model"}
                    | user_id=~"$user" | user_id!="" | user_id!="-"
                    | unwrap tokens_total [$__range]))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    sum by (user_id, subscription) (count_over_time(
                    {service_name="maas-gateway", response_code=~"2..",
                    subscription=~"$subscription", model=~"$model"}
                    | user_id=~"$user" | user_id!="" | user_id!="-" [$__range]))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: loki
                  query: >-
                    sum by (user_id, subscription) (count_over_time(
                    {service_name="maas-gateway", response_code="429",
                    subscription=~"$subscription"}
                    | user_id=~"$user" | user_id!="" | user_id!="-" [$__range]))
                    or
                    sum by (user_id, subscription) (sum_over_time(
                    {service_name="maas-gateway", response_code=~"2..",
                    subscription=~"$subscription", model=~"$model"}
                    | user_id=~"$user" | user_id!="" | user_id!="-"
                    | unwrap tokens_total [$__range])) * 0

  layouts:
    - kind: Grid
      spec:
        display:
          title: "Overview"
          collapse:
            open: true
        items:
          - x: 0
            "y": 0
            width: 5
            height: 5
            content:
              "$ref": "#/spec/panels/totalTokens"
          - x: 5
            "y": 0
            width: 5
            height: 5
            content:
              "$ref": "#/spec/panels/totalRequests"
          - x: 10
            "y": 0
            width: 5
            height: 5
            content:
              "$ref": "#/spec/panels/totalErrors"
          - x: 15
            "y": 0
            width: 5
            height: 5
            content:
              "$ref": "#/spec/panels/successRate"
          - x: 20
            "y": 0
            width: 4
            height: 5
            content:
              "$ref": "#/spec/panels/activeUsers"

    - kind: Grid
      spec:
        display:
          title: "Token Consumption by User"
          collapse:
            open: true
        items:
          - x: 0
            "y": 0
            width: 24
            height: 12
            content:
              "$ref": "#/spec/panels/tokenConsumptionByUser"
