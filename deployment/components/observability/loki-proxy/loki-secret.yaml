# Long-lived SA token secret for the loki-query-proxy service account.
# Used by the Perses "loki" datasource to authenticate directly to LokiStack.
apiVersion: v1
kind: Secret
metadata:
  name: loki-secret
  labels:
    app: perses
    app.kubernetes.io/part-of: maas-observability
  annotations:
    kubernetes.io/service-account.name: loki-query-proxy
type: kubernetes.io/service-account-token
