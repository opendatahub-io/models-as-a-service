# Restrict direct LokiStack Gateway access: only the query proxy and
# intra-namespace Loki components are allowed.
# Users cannot bypass the proxy to query Loki directly.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: loki-gateway-proxy-restriction
  labels:
    app.kubernetes.io/part-of: maas-observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: lokistack-gateway
      app.kubernetes.io/instance: maas-loki
  policyTypes:
  - Ingress
  ingress:
  # Allow loki-query-proxy pods (same namespace)
  - from:
    - podSelector:
        matchLabels:
          app: loki-query-proxy
    ports:
    - protocol: TCP
      port: 8080
  # Allow intra-namespace traffic (Loki components talking to gateway)
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 8080
