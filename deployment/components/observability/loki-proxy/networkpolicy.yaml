# Restrict direct LokiStack Gateway access: only the query proxy is allowed.
# Users cannot bypass the proxy to query Loki directly.
#
# NOTE: This resource targets openshift-logging, not kuadrant-system.
# The kustomization namespace override is suppressed for this file;
# apply separately if your kustomize version doesn't support mixed namespaces:
#   oc apply -f networkpolicy.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: loki-gateway-proxy-restriction
  namespace: openshift-logging
  labels:
    app.kubernetes.io/part-of: maas-observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: lokistack-gateway
      app.kubernetes.io/instance: maas-loki
  policyTypes:
  - Ingress
  ingress:
  # Allow loki-query-proxy pods from kuadrant-system
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kuadrant-system
      podSelector:
        matchLabels:
          app: loki-query-proxy
    ports:
    - protocol: TCP
      port: 8080
  # Allow intra-namespace traffic (Loki components talking to gateway)
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-logging
    ports:
    - protocol: TCP
      port: 8080
