apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: maas-loki-proxy
  annotations:
    config.kubernetes.io/local-config: "true"

namespace: kuadrant-system

resources:
  - proxy-source-configmap.yaml
  - rbac.yaml
  - service.yaml
  - deployment-user.yaml
  # networkpolicy.yaml targets openshift-logging (not kuadrant-system).
  # Apply separately: oc apply -f networkpolicy.yaml
