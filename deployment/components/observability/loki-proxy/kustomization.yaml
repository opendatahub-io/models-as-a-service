apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: maas-loki-proxy
  annotations:
    config.kubernetes.io/local-config: "true"

# Change this to deploy to a different namespace (e.g. for ODH or RHOAI).
# All resources and ClusterRoleBinding subjects will follow automatically.
namespace: loki-stack-namespace

resources:
  - proxy-source-configmap.yaml
  - rbac.yaml
  - service.yaml
  - deployment-user.yaml
  - networkpolicy.yaml

replacements:
  - source:
      kind: ServiceAccount
      name: loki-query-proxy
      fieldPath: metadata.namespace
    targets:
      - select:
          kind: ClusterRoleBinding
        fieldPaths:
          - subjects.[kind=ServiceAccount].namespace
