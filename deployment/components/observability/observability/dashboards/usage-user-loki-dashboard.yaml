# User-scoped usage dashboard — queries go through loki-query-proxy which
# injects user_id filtering based on the logged-in user's Kubernetes token.
# CEL filter restricts logs to inference-only paths; no probe traffic to filter.
apiVersion: perses.dev/v1alpha1
kind: PersesDashboard
metadata:
  name: usage-user-loki-dashboard
  namespace: opendatahub
  labels:
    app.kubernetes.io/managed-by: maas-observability
    app.kubernetes.io/component: perses
spec:
  display:
    name: "Usage User Dashboard"
    description: >-
      Personal view of model usage. Shows your token consumption, request
      counts, and rate limiting. Queries are automatically filtered to your
      user identity via the Loki query proxy.
  duration: 1h

  variables:
    - kind: ListVariable
      spec:
        name: subscription
        display:
          name: "Subscription"
        allowMultiple: true
        allowAllValue: true
        defaultValue: "$__all"
        plugin:
          kind: LokiLabelValuesVariable
          spec:
            datasource:
              kind: LokiDatasource
              name: scoped-loki
            labelName: subscription
            matchers:
              - '{service_name="maas-gateway", subscription!="-"}'
    - kind: ListVariable
      spec:
        name: model
        display:
          name: "Model"
        allowMultiple: true
        allowAllValue: true
        defaultValue: "$__all"
        plugin:
          kind: LokiLabelValuesVariable
          spec:
            datasource:
              kind: LokiDatasource
              name: scoped-loki
            labelName: model
            matchers:
              - '{service_name="maas-gateway", model!="-"}'
    - kind: ListVariable
      spec:
        name: view_by
        display:
          name: "View by"
        allowMultiple: false
        allowAllValue: false
        defaultValue: "model"
        plugin:
          kind: StaticListVariable
          spec:
            values:
              - value: "model"
                label: By model
              - value: "subscription"
                label: By subscription

  panels:
    totalTokens:
      kind: Panel
      spec:
        display:
          name: "Total Tokens"
          description: "Total tokens consumed over the selected time window."
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
              shortValues: true
              decimalPlaces: 0
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: scoped-loki
                  query: >-
                    sum(sum_over_time({service_name="maas-gateway",
                    subscription=~"$subscription", model=~"$model", response_type="hit"}
                    | unwrap tokens_total [$__range]))
                    or vector(0)

    totalRequests:
      kind: Panel
      spec:
        display:
          name: "Total Successful Requests"
          description: "Total successful (2xx) requests over the selected time window."
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
              shortValues: true
              decimalPlaces: 0
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: scoped-loki
                  query: >-
                    sum(count_over_time({service_name="maas-gateway",
                    subscription=~"$subscription", model=~"$model", response_type="hit"}
                    [$__range]))
                    or vector(0)

    totalRateLimited:
      kind: Panel
      spec:
        display:
          name: "Total Rate Limited Requests"
          description: "Total rate-limited requests over the selected time window."
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
              shortValues: true
              decimalPlaces: 0
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: scoped-loki
                  query: >-
                    sum(count_over_time({service_name="maas-gateway",
                    subscription=~"$subscription", model=~"$model", response_type="rate_limit"}
                    [$__range]))
                    or vector(0)

    successRate:
      kind: Panel
      spec:
        display:
          description: "Percentage of authorized vs total requests over the selected time window."
          name: Success Rate
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              decimalPlaces: 1
              unit: percent-decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: scoped-loki
                  query: >-
                    (sum(count_over_time({service_name="maas-gateway",
                    subscription=~"$subscription", model=~"$model", response_type="hit"}
                    [$__range]))
                    /
                    sum(count_over_time({service_name="maas-gateway",
                    subscription=~"$subscription", model=~"$model"}
                    [$__range])))
                    or vector(1)

    tokenConsumptionOverTime:
      kind: Panel
      spec:
        display:
          name: "Token consumption"
          description: >-
            Tokens from successful requests (2xx) over time by model or subscription.
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
              values: []
            visual:
              display: line
              lineWidth: 3
              areaOpacity: 1
              connectNulls: true
              stack: all
              showPoints: always
              pointRadius: 6
            yAxis:
              min: 0
              format:
                unit: decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: scoped-loki
                  query: >-
                    sum by (${view_by:raw}) (sum_over_time({service_name="maas-gateway",
                    subscription=~"$subscription", model=~"$model", response_type="hit"}
                    | unwrap tokens_total [30m]))

    tokenConsumptionTable:
      kind: Panel
      spec:
        display:
          name: "Usage breakdown"
          description: >-
            All model/subscription pairs. **View by** changes the chart; table always shows full detail.
        plugin:
          kind: Table
          spec:
            density: "compact"
            pagination: true
            transforms:
              - kind: "MergeSeries"
                spec: {}
            columnSettings:
              - name: "timestamp"
                hide: true
              - name: "model"
                header: "Model"
                align: "left"
                enableSorting: true
              - name: "subscription"
                header: "Subscription"
                align: "left"
                enableSorting: true
              - name: "value #1"
                header: "Tokens used"
                align: "right"
                enableSorting: true
                sort: "desc"
                format:
                  unit: decimal
                  shortValues: true
              - name: "value #2"
                header: "Successful Requests"
                align: "right"
                enableSorting: true
                format:
                  unit: decimal
                  decimalPlaces: 0
              - name: "value #3"
                header: "Rate Limited Requests"
                align: "right"
                enableSorting: true
                format:
                  unit: decimal
                  decimalPlaces: 0
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: scoped-loki
                  query: >-
                    sum by (model, subscription) (sum_over_time(
                    {service_name="maas-gateway",
                    subscription=~"$subscription", model=~"$model", response_type="hit"}
                    | unwrap tokens_total [$__range] offset -$__range))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: scoped-loki
                  query: >-
                    sum by (model, subscription) (count_over_time(
                    {service_name="maas-gateway",
                    subscription=~"$subscription", model=~"$model", response_type="hit"}
                    [$__range] offset -$__range))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: LokiTimeSeriesQuery
                spec:
                  datasource:
                    kind: LokiDatasource
                    name: scoped-loki
                  query: >-
                    sum by (model, subscription) (count_over_time(
                    {service_name="maas-gateway",
                    subscription=~"$subscription", model=~"$model", response_type="rate_limit"}
                    [$__range] offset -$__range))
                    or
                    (sum by (model, subscription) (count_over_time(
                    {service_name="maas-gateway",
                    subscription=~"$subscription", model=~"$model", response_type="hit"}
                    [$__range] offset -$__range)) * 0)

  layouts:
    - kind: Grid
      spec:
        display:
          title: "Overview"
          collapse:
            open: true
        items:
          - x: 0
            "y": 0
            width: 6
            height: 5
            content:
              "$ref": "#/spec/panels/totalTokens"
          - x: 6
            "y": 0
            width: 6
            height: 5
            content:
              "$ref": "#/spec/panels/totalRequests"
          - x: 12
            "y": 0
            width: 6
            height: 5
            content:
              "$ref": "#/spec/panels/totalRateLimited"
          - x: 18
            "y": 0
            width: 6
            height: 5
            content:
              "$ref": "#/spec/panels/successRate"

    - kind: Grid
      spec:
        display:
          title: "Token consumption"
          collapse:
            open: true
        items:
          - x: 0
            "y": 0
            width: 24
            height: 10
            content:
              "$ref": "#/spec/panels/tokenConsumptionOverTime"
          - x: 0
            "y": 10
            width: 24
            height: 8
            content:
              "$ref": "#/spec/panels/tokenConsumptionTable"
