apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: maas-xks-overlay

resources:
  - ../../base/maas-controller/crd
  - ../../base/maas-controller/rbac
  - ../../base/maas-controller/manager
  - ../../base/maas-controller/webhook
  - cert-manager/

patches:
  # Remove OCP service-serving cert annotation (cert-manager handles TLS on xKS)
  - target:
      kind: Service
      name: maas-controller-webhook-service
    patch: |
      - op: remove
        path: /metadata/annotations/service.beta.openshift.io~1serving-cert-secret-name

  # Replace OCP CA bundle injection with cert-manager CA injection
  - target:
      kind: ValidatingWebhookConfiguration
      name: maas-validating-webhook-configuration
    patch: |
      - op: remove
        path: /metadata/annotations/service.beta.openshift.io~1inject-cabundle
      - op: add
        path: /metadata/annotations/cert-manager.io~1inject-ca-from
        value: "$(NAMESPACE)/maas-controller-webhook-cert"

  # Mount the cert-manager TLS secret into the controller deployment
  - target:
      kind: Deployment
      name: maas-controller
    patch: |
      - op: add
        path: /spec/template/spec/volumes
        value:
          - name: webhook-certs
            secret:
              secretName: maas-controller-webhook-cert
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts
        value:
          - name: webhook-certs
            mountPath: /tmp/k8s-webhook-server/serving-certs
            readOnly: true
