apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: maas-api
rules:
# Database configuration secret
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["maas-db-config"]
  verbs: ["get"]

# SA token provider resources
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch", "create"]
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: [""]
  # Needed for TokenRequest API
  resources: ["serviceaccounts/token"]
  verbs: ["create"]

# Token review for authentication
- apiGroups: ["authentication.k8s.io"]
  resources: ["tokenreviews"]
  verbs: ["create"]

# Subject access review for admin authorization (SAR-based admin check)
- apiGroups: ["authorization.k8s.io"]
  resources: ["subjectaccessreviews"]
  verbs: ["create"]


# MaaS CRs for the models endpoint and subscription selector (cached via informer)
- apiGroups: ["maas.opendatahub.io"]
  resources: ["maasauthpolicies", "maasmodelrefs", "maassubscriptions"]
  verbs: ["get", "list", "watch"]

# HTTPRoutes (for future use, e.g. listing or resolving model routes)
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["httproutes"]
  verbs: ["get", "list", "watch"]

# Gateways for /v1/tenants endpoint (gateway discovery)
# Only 'get' needed - code uses .Get(gatewayName) not .List()
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["gateways"]
  verbs: ["get"]

# OpenShift Routes for /v1/tenants endpoint (external hostname discovery)
# Routes are optional - endpoint will fall back to Gateway status if Routes don't exist
# 'list' needed - code uses .List() to find Route targeting Gateway
- apiGroups: ["route.openshift.io"]
  resources: ["routes"]
  verbs: ["list"]

# Metrics and monitoring
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
