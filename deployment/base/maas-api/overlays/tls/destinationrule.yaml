apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: maas-api-backend-tls
  namespace: openshift-ingress
spec:
  host: maas-api.maas-api.svc.cluster.local
  trafficPolicy:
    portLevelSettings:
    - port:
        number: 8443
      tls:
        mode: SIMPLE
        # Known gap on OpenShift < 4.22: BackendTLSPolicy is not available for
        # this managed gateway path, so the gateway cannot receive a service-ca
        # trust bundle through Gateway API yet. Istio can verify upstream
        # certificates when a CA file or credentialName is available, but the
        # managed gateway proxy does not currently mount or receive the OpenShift
        # service-ca bundle that signs maas-api's serving cert.
        # Traffic is still encrypted.
        insecureSkipVerify: true
