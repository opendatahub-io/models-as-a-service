---
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: gateway-auth-policy
  namespace: openshift-ingress
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: maas-default-gateway
  rules:
    metadata:
      # Tier lookup for all authenticated users
      matchedTier:
        http:
          url: https://maas-api.opendatahub.svc.cluster.local:8443/v1/tiers/lookup
          contentType: application/json
          method: POST
          body:
            expression: '{ "groups": auth.identity.user.groups }'
        cache:
          key:
            selector: auth.identity.user.username
          ttl: 300

      # NEW: API Key Validation (for sk-oai-* tokens)
      # Calls validation endpoint and stores result in metadata
      apiKeyValidation:
        when:
          # Only call validation for API key requests
          - selector: request.headers.authorization
            operator: matches
            value: "^Bearer sk-oai-.*"
        http:
          url: https://maas-api.opendatahub.svc.cluster.local:8443/internal/v1/api-keys/validate
          contentType: application/json
          method: POST
          body:
            # Extract key from "Bearer sk-oai-..." header
            expression: '{"key": request.headers.authorization.@replace:{"old":"Bearer ","new":""}}'
        cache:
          key:
            selector: request.headers.authorization
          ttl: 60

    authentication:
      # API Key "Authentication" - accepts request, real validation happens in metadata
      api-keys:
        when:
          - selector: request.headers.authorization
            operator: matches
            value: "^Bearer sk-oai-.*"
        plain:
          # Extract the key to make it available in auth.identity
          selector: request.headers.authorization
        defaults:
          # Will be overridden by metadata validation response
          userid:
            expression: auth.metadata.apiKeyValidation.userId
          user:
            expression: |
              {
                "username": auth.metadata.apiKeyValidation.username,
                "groups": auth.metadata.apiKeyValidation.groups
              }

      # Service Account Token Authentication (K8s JWT tokens)
      service-accounts:
        when:
          - selector: request.headers.authorization
            operator: matches
            value: "^Bearer eyJ.*"
        kubernetesTokenReview:
          audiences:
            - maas-default-gateway-sa
        defaults:
          userid:
            expression: |
              auth.identity.user.username.split(":")[3]
        cache:
          key:
            selector: context.request.http.headers.authorization.@case:lower
          ttl: 600

    authorization:
      # NEW: Validate API key is valid before allowing access
      api-key-valid:
        when:
          # Only apply this check for API key requests
          - selector: request.headers.authorization
            operator: matches
            value: "^Bearer sk-oai-.*"
        patternMatching:
          patterns:
            # Deny if validation failed or key is invalid
            - selector: auth.metadata.apiKeyValidation.valid
              operator: eq
              value: "true"

      # Tier-based access control
      tier-access:
        cache:
          key:
            selector: "{auth.identity.user.username}:{request.path}"
          ttl: 60
        kubernetesSubjectAccessReview:
          user:
            expression: auth.identity.user.username
          authorizationGroups:
            expression: auth.identity.user.groups
          resourceAttributes:
            group:
              value: serving.kserve.io
            resource:
              value: llminferenceservices
            namespace:
              expression: request.path.split("/")[1]
            name:
              expression: request.path.split("/")[2]
            verb:
              value: post

    response:
      success:
        headers:
          X-MaaS-Username:
            plain:
              selector: auth.identity.userid
          X-MaaS-Key-Id:
            plain:
              selector: auth.metadata.apiKeyValidation.keyId
        filters:
          identity:
            json:
              properties:
                userid:
                  expression: auth.identity.userid
                tier:
                  expression: auth.metadata.matchedTier.tier
