apiVersion: v1
kind: Service
metadata:
  name: weight-controller-metrics
  namespace: maas-system
  labels:
    app: weight-controller
    app.kubernetes.io/name: weight-controller
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: models-as-a-service
spec:
  selector:
    app: weight-controller
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
      protocol: TCP
