apiVersion: apps/v1
kind: Deployment
metadata:
  name: weight-controller
  namespace: maas-system
  labels:
    app: weight-controller
    app.kubernetes.io/name: weight-controller
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: models-as-a-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weight-controller
  template:
    metadata:
      labels:
        app: weight-controller
        app.kubernetes.io/name: weight-controller
        app.kubernetes.io/component: controller
        app.kubernetes.io/part-of: models-as-a-service
    spec:
      serviceAccountName: weight-controller
      containers:
        - name: controller
          image: quay.io/opendatahub/weight-controller:latest
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --reconcile-interval=10s
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 10
