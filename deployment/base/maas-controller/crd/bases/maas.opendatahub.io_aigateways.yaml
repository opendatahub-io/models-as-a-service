---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: aigateways.maas.opendatahub.io
spec:
  group: maas.opendatahub.io
  names:
    kind: AIGateway
    listKind: AIGatewayList
    plural: aigateways
    shortNames:
    - aigw
    singular: aigateway
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Ready
      jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - description: Tenant namespace
      jsonPath: .status.tenantNamespace
      name: Tenant Namespace
      type: string
    - description: Gateway name
      jsonPath: .status.gatewayRef.name
      name: Gateway
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AIGateway bootstraps one tenant slice: a dedicated Gateway, a tenant namespace,
          the MaaS tenant config object, and tenant-admin RBAC.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AIGatewaySpec defines the tenant bootstrap contract.
            properties:
              domain:
                description: |-
                  Domain is the tenant hostname used for data-plane routing.
                  When set together with TLS, the controller creates an HTTPS listener on port 443.
                  When set without TLS, the controller creates an HTTP listener on port 80.
                  When omitted, the controller creates a default HTTP listener on port 80 without a hostname.
                maxLength: 253
                type: string
              gateway:
                description: Gateway is the Gateway API template reconciled for this
                  tenant.
                properties:
                  gatewayClassName:
                    default: openshift-default
                    description: GatewayClassName is the GatewayClass used by the
                      tenant Gateway.
                    maxLength: 253
                    type: string
                  name:
                    description: Name is the Gateway name. If omitted, the AIGateway
                      name is used.
                    maxLength: 63
                    pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$
                    type: string
                  namespace:
                    description: Namespace is the namespace where the Gateway is created.
                    maxLength: 63
                    pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$
                    type: string
                type: object
              oidc:
                description: |-
                  OIDC contains non-MaaS-specific OIDC settings for this AI Gateway.
                  The current controller mirrors this into the temporary Tenant config object
                  until the MaaS config CR rename lands.
                properties:
                  clientId:
                    description: ClientID is the OAuth2 client ID.
                    maxLength: 256
                    minLength: 1
                    pattern: ^\S+$
                    type: string
                  issuerUrl:
                    description: IssuerURL is the OIDC issuer URL (e.g. https://keycloak.example.com/realms/maas).
                    maxLength: 2048
                    minLength: 9
                    pattern: ^https://\S+$
                    type: string
                  ttl:
                    default: 300
                    description: TTL is the JWKS cache duration in seconds.
                    minimum: 30
                    type: integer
                required:
                - clientId
                - issuerUrl
                type: object
              rbac:
                description: RBAC configures tenant-admin access to the tenant namespace
                  and this AIGateway object.
                properties:
                  admins:
                    description: Admins are bound to tenant-admin roles for this AIGateway
                      and tenant namespace.
                    items:
                      description: AIGatewayRBACSubject mirrors RBAC Subject for the
                        supported tenant-admin cases.
                      properties:
                        kind:
                          description: Kind is the RBAC subject kind.
                          enum:
                          - User
                          - Group
                          - ServiceAccount
                          type: string
                        name:
                          description: Name is the subject name.
                          maxLength: 253
                          minLength: 1
                          type: string
                        namespace:
                          description: Namespace is required only for ServiceAccount
                            subjects.
                          maxLength: 63
                          type: string
                      required:
                      - kind
                      - name
                      type: object
                    maxItems: 128
                    type: array
                type: object
              tenantNamespace:
                description: TenantNamespace identifies the namespace where tenant
                  administrators manage MaaS objects.
                properties:
                  cleanupOnDelete:
                    default: false
                    description: |-
                      CleanupOnDelete deletes the namespace during AIGateway deletion only when
                      the namespace is controller-created and still labeled for this AIGateway.
                      Defaults to false to avoid deleting tenant data by surprise.
                    type: boolean
                  create:
                    default: true
                    description: Create controls whether the controller creates the
                      namespace if missing.
                    type: boolean
                  name:
                    description: Name is the namespace where tenant-scoped MaaS objects
                      are created.
                    maxLength: 63
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    type: string
                required:
                - name
                type: object
              tls:
                description: |-
                  TLS configures the TLS certificate for the tenant Gateway HTTPS listener.
                  Only effective when Domain is also set.
                properties:
                  certificateRef:
                    description: CertificateRef names a Secret containing the TLS
                      certificate.
                    properties:
                      name:
                        description: Name is the Secret name.
                        maxLength: 253
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                required:
                - certificateRef
                type: object
            required:
            - tenantNamespace
            type: object
          status:
            description: AIGatewayStatus defines the observed tenant bootstrap state.
            properties:
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              gatewayRef:
                description: GatewayRef is the reconciled Gateway reference.
                properties:
                  name:
                    default: maas-default-gateway
                    maxLength: 63
                    pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$
                    type: string
                  namespace:
                    default: openshift-ingress
                    maxLength: 63
                    pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$
                    type: string
                type: object
              phase:
                description: Phase is a high-level lifecycle phase for the tenant
                  bootstrap.
                enum:
                - Pending
                - Active
                - Degraded
                - Failed
                type: string
              tenantNamespace:
                description: TenantNamespace is the reconciled tenant namespace.
                type: string
            type: object
        type: object
        x-kubernetes-validations:
        - message: spec.tenantNamespace.name is immutable
          rule: self.spec.tenantNamespace.name == oldSelf.spec.tenantNamespace.name
    served: true
    storage: true
    subresources:
      status: {}
