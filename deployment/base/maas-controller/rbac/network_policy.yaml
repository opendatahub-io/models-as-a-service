apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: maas-controller-deny-external
  labels:
    app.kubernetes.io/part-of: models-as-a-service
    app.kubernetes.io/component: networking
spec:
  podSelector:
    matchLabels:
      control-plane: maas-controller
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
