apiVersion: v1
kind: Service
metadata:
  name: maas-controller-metrics
  labels:
    app: maas-controller
    control-plane: maas-controller
spec:
  selector:
    app: maas-controller
    control-plane: maas-controller
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP
