apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: maas-controller-metrics
  labels:
    app: maas-controller
    monitoring.opendatahub.io/scrape: "true"
spec:
  selector:
    matchLabels:
      app: maas-controller
      control-plane: maas-controller
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
