apiVersion: v1
kind: ConfigMap
metadata:
  name: payload-processing-plugins
  namespace: openshift-ingress
data:
  # Each key defines a plugin passed as --plugin <value> to the BBR ext_proc server.
  # Format: "<plugin-type>:<plugin-name>[:<json-config>]"
  # Overlays can add/remove plugins by patching this ConfigMap.
  plugin-0: "body-field-to-header:model-extractor:{\"field_name\":\"model\",\"header_name\":\"X-Gateway-Model-Name\"}"
  plugin-1: "model-provider-resolver:model-provider-resolver"
  plugin-2: "api-translation:api-translation"
  plugin-3: "apikey-injection:apikey-injection"
