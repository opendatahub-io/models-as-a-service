apiVersion: apps/v1
kind: Deployment
metadata:
  name: payload-processing
  namespace: openshift-ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payload-processing
  template:
    metadata:
      labels:
        app: payload-processing
    spec:
      serviceAccountName: payload-processing
      securityContext:
        runAsNonRoot: true
      containers:
        - name: bbr
          image: payload-processing
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          args:
            - "--streaming"
            - --v
            - "3"
            - --plugin
            - "$(PLUGIN_0)"
            - --plugin
            - "$(PLUGIN_1)"
            - --plugin
            - "$(PLUGIN_2)"
            - --plugin
            - "$(PLUGIN_3)"
            - --tracing=false
          env:
            - name: PLUGIN_0
              valueFrom:
                configMapKeyRef:
                  name: payload-processing-plugins
                  key: plugin-0
            - name: PLUGIN_1
              valueFrom:
                configMapKeyRef:
                  name: payload-processing-plugins
                  key: plugin-1
            - name: PLUGIN_2
              valueFrom:
                configMapKeyRef:
                  name: payload-processing-plugins
                  key: plugin-2
            - name: PLUGIN_3
              valueFrom:
                configMapKeyRef:
                  name: payload-processing-plugins
                  key: plugin-3
          ports:
            - containerPort: 9004
              name: grpc
              protocol: TCP
            - containerPort: 9005
              name: metrics
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
