# PoC: Per-model group membership policy (lightweight, chains with Gateway policy)
#
# This policy handles ONLY the require-group-membership check for a single model.
# It is intentionally tiny — no API key validation, no subscription check.
# Those are handled by the Gateway-level policy (01-gateway-authpolicy.yaml).
#
# Kuadrant defaults/overrides chaining:
#   Gateway policy (defaults) → handles auth + subscription
#   This per-route policy (defaults) → adds group membership check on top
#
# One of these exists per model that has group/user restrictions in MaaSAuthPolicy.
# Models with no group restrictions need no per-route policy at all.
#
# Usage: copy and substitute MODEL_NAMESPACE, MODEL_NAME, ALLOWED_GROUPS, ALLOWED_USERS
# The maas-controller would generate these automatically (same aggregation pattern as today).
#
# Apply alongside the Gateway policy — do NOT delete the Gateway policy first.
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: maas-auth-MODEL_NAME-groups
  namespace: MODEL_NAMESPACE
  labels:
    maas.opendatahub.io/model: MODEL_NAME
    app.kubernetes.io/managed-by: maas-controller
    app.kubernetes.io/part-of: maas-auth-policy
    app.kubernetes.io/component: group-policy
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: MODEL_NAME  # the KServe-owned or ExternalModel HTTPRoute
  defaults:
    rules:
      authorization:
        require-group-membership:
          priority: 0
          metrics: false
          opa:
            rego: |
              # Allowed groups and users from all MaaSAuthPolicies for this model.
              # Generated by maas-controller — same aggregation logic as today.
              allowed_groups := ALLOWED_GROUPS  # e.g. ["team-a", "team-b"]
              allowed_users  := ALLOWED_USERS   # e.g. ["alice", "bob"]

              username := input.auth.metadata.apiKeyValidation.username
                  { object.get(input.auth, "metadata", {}).apiKeyValidation.username != "" }
              else := input.auth.identity.preferred_username
                  { object.get(input.auth, "identity", {}).preferred_username != "" }
              else := input.auth.identity.sub
                  { object.get(input.auth, "identity", {}).sub != "" }
              else := input.auth.identity.user.username
                  { object.get(input.auth, "identity", {}).user.username != "" }
              else := ""

              groups := input.auth.metadata.apiKeyValidation.groups
                  { object.get(input.auth, "metadata", {}).apiKeyValidation.groups != [] }
              else := input.auth.identity.groups
                  { object.get(input.auth, "identity", {}).groups != [] }
              else := input.auth.identity.user.groups
                  { object.get(input.auth, "identity", {}).user.groups != [] }
              else := []

              allow {
                  username == allowed_users[_]
              }
              allow {
                  groups[_] == allowed_groups[_]
              }
